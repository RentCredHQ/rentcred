version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentcred-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentcred
      POSTGRES_PASSWORD: rentcred
      POSTGRES_DB: rentcred
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rentcred-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
